name: Dump event
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Event name
        run: echo "event=${{ github.event_name }}"
      - name: head.sha probe
        run: |
          echo "raw_head_sha=[${{ github.event.pull_request.head.sha }}]"
          echo "raw_issue_pr_url=[${{ github.event.issue.pull_request.url }}]"
      - name: Full toJSON dump
        run: |
          cat <<'JSON'
          ${{ toJSON(github.event) }}
          JSON
      - name: Try checkout with that ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: What did we check out?
        run: |
          git log -1 --oneline
          git rev-parse HEAD
          git rev-parse --abbrev-ref HEAD || true

name: dump-context
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  issue_comment:
    types: [created]
  push:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Event summary
        run: |
          {
            echo "## dump-context"
            echo "- event_name: \`${{ github.event_name }}\`"
            echo "- action: \`${{ github.event.action }}\`"
            echo "- actor: \`${{ github.actor }}\`"
            echo "- triggering_actor: \`${{ github.triggering_actor }}\`"
            echo "- sender.login: \`${{ github.event.sender.login }}\`"
            echo "- sender.type: \`${{ github.event.sender.type }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Dump FULL github context
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          echo "$GITHUB_CONTEXT"
          echo "$GITHUB_CONTEXT" > /tmp/github_context.json
      - name: Dump job/runner/env contexts
        env:
          JOB_CONTEXT: ${{ toJSON(job) }}
          RUNNER_CONTEXT: ${{ toJSON(runner) }}
          STRATEGY_CONTEXT: ${{ toJSON(strategy) }}
        run: |
          echo "JOB:"; echo "$JOB_CONTEXT"
          echo "RUNNER:"; echo "$RUNNER_CONTEXT"
          echo "ENV VARS:"; env | sort
